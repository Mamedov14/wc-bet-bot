bot {
  token = ${BOT_TOKEN}
  name = ${BOT_NAME}
  adminId = ${?ADMIN_ID}
}

app {
  zone = "Europe/Moscow"
  zone = ${?APP_ZONE}
  finishedStatuses = ["played", "finished", "complete", "completed", "fulltime", "ft", "aet", "pen"]
  notifyHorizonHours = 24
  reminderMinutes = 60
  digestTime = "09:00"
  digestTime = ${?DIGEST_TIME}
  temporaryNotice = "⚠️ <b>Временный режим.</b> Основной сервер недоступен, бот работает на резервной базе. История и таблица сейчас неполные — после восстановления всё объединим и пересчитаем. Прогнозы засчитываются как обычно. Если бот «забыл» тебя — нажми /start."
  temporaryNotice = ${?TEMPORARY_NOTICE}
}

db {
  jdbcUrl = "jdbc:postgresql://localhost:15432/bet"
  jdbcUrl = ${?DB_URL}
  username = "bet_user"
  username = ${?DB_USER}
  password = "password"
  password = ${?DB_PASSWORD}
  poolName = "bet-pool"
  maxPoolSize = 5
}

flyway {
  locations = ["db/migration"]
}

httpClient {
  fifa {
    url = "https://play.fifa.com"
    requestTimeout = "30s"
  }
  connectTimeout = "10s"
}

jobs {
  sync {
    initialDelay = "5s"
    period = "60s"
  }
  notify {
    initialDelay = "30s"
    period = "60s"
  }
  reminder {
    initialDelay = "45s"
    period = "60s"
  }
  digest {
    initialDelay = "60s"
    period = "60s"
  }
}

scheduling {
  threads = 2
}

logging {
  levels {
    "wcbet" = "INFO"
    "ru.tinkoff.kora" = "WARN"
  }
}
