bot {
  token = ${BOT_TOKEN}
  name = ${BOT_NAME}
}

app {
  zone = "Europe/Moscow"
  zone = ${?APP_ZONE}
  finishedStatuses = ["played", "finished", "complete", "completed", "fulltime", "ft", "aet", "pen"]
  notifyHorizonHours = 24
}

db {
  jdbcUrl = "jdbc:postgresql://localhost:15432/bet"
  jdbcUrl = ${?DB_URL}
  username = "bet_user"
  username = ${?DB_USER}
  password = "password"
  password = ${?DB_PASSWORD}
  poolName = "bet-pool"
  maxPoolSize = 5
}

flyway {
  locations = ["db/migration"]
}

httpClient {
  fifa {
    url = "https://play.fifa.com"
    requestTimeout = "30s"
  }
  connectTimeout = "10s"
}

jobs {
  sync {
    initialDelay = "5s"
    period = "60s"
  }
  notify {
    initialDelay = "30s"
    period = "60s"
  }
}

scheduling {
  threads = 2
}

logging {
  levels {
    "wcbet" = "INFO"
    "ru.tinkoff.kora" = "WARN"
  }
}
